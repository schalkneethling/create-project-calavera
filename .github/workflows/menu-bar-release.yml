name: Release macOS menu-bar app

on:
  push:
    tags: ["menu-bar-v*"]

permissions:
  contents: read

jobs:
  test:
    runs-on: macos-15
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0
        with:
          persist-credentials: false
      - uses: pnpm/action-setup@0ebf47130e4866e96fce0953f49152a61190b271
      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e
        with:
          node-version: 24
          package-manager-cache: false
      - name: Verify release tag matches the app version
        env:
          RELEASE_TAG: ${{ github.ref_name }}
        run: |
          APP_VERSION="$(node --input-type=module -e "import config from './apps/menu-bar/src-tauri/tauri.conf.json' with { type: 'json' }; process.stdout.write(config.version)")"
          EXPECTED_TAG="menu-bar-v${APP_VERSION}"
          if [ "$RELEASE_TAG" != "$EXPECTED_TAG" ]; then
            echo "Release tag $RELEASE_TAG does not match app version $APP_VERSION (expected $EXPECTED_TAG)." >&2
            exit 1
          fi
      - run: pnpm install --frozen-lockfile --ignore-scripts
      - run: pnpm --filter @calavera/menu-bar test
      - run: pnpm --filter @calavera/menu-bar build:web

  build:
    runs-on: macos-15
    needs: test
    environment: publish
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0
        with:
          persist-credentials: false
      - uses: pnpm/action-setup@0ebf47130e4866e96fce0953f49152a61190b271
      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e
        with:
          node-version: 24
          package-manager-cache: false
      - uses: dtolnay/rust-toolchain@4cda84d5c5c54efe2404f9d843567869ab1699d4
        with:
          targets: aarch64-apple-darwin,x86_64-apple-darwin
      - run: pnpm install --frozen-lockfile --ignore-scripts
      - uses: tauri-apps/tauri-action@84b9d35b5fc46c1e45415bdb6144030364f7ebc5
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          APPLE_CERTIFICATE: ${{ secrets.APPLE_CERTIFICATE }}
          APPLE_CERTIFICATE_PASSWORD: ${{ secrets.APPLE_CERTIFICATE_PASSWORD }}
          APPLE_SIGNING_IDENTITY: ${{ secrets.APPLE_SIGNING_IDENTITY }}
          APPLE_ID: ${{ secrets.APPLE_ID }}
          APPLE_PASSWORD: ${{ secrets.APPLE_PASSWORD }}
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
        with:
          projectPath: apps/menu-bar
          args: --target universal-apple-darwin
          tagName: menu-bar-v__VERSION__
          releaseName: Calavera menu-bar v__VERSION__
          releaseBody: Signed, notarized, and stapled universal macOS DMG.
          releaseDraft: true
