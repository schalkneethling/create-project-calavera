name: Publish to npm

on:
  release:
    types: [published]

permissions:
  contents: read

jobs:
  test:
    name: Test
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0
        with:
          persist-credentials: false
      - name: Setup pnpm
        uses: pnpm/action-setup@0ebf47130e4866e96fce0953f49152a61190b271
      - name: Setup Node.js
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e
        with:
          node-version: 24
          package-manager-cache: false
      - name: Setup uv
        uses: astral-sh/setup-uv@11f9893b081a58869d3b5fccaea48c9e9e46f990 # v8.3.2
        with:
          version: "0.11.16"
          python-version: "3.12"
          enable-cache: false
      - name: Install dependencies
        run: pnpm install --frozen-lockfile --ignore-scripts
      - name: Check
        run: pnpm check
      - name: Validate package
        run: pnpm publish:check
      - name: Install zizmor
        run: python -m pip install --user zizmor==1.25.2
      - name: Check workflows
        run: zizmor --offline .github/workflows

  build:
    name: Build
    runs-on: ubuntu-latest
    needs: test
    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0
        with:
          persist-credentials: false
      - name: Setup pnpm
        uses: pnpm/action-setup@0ebf47130e4866e96fce0953f49152a61190b271
      - name: Setup Node.js
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e
        with:
          node-version: 24
          package-manager-cache: false
      - name: Install dependencies
        run: pnpm install --frozen-lockfile --ignore-scripts
      - name: Build web composer
        run: pnpm web:build
      - name: Build Baseline Explorer
        run: pnpm --filter @calavera/baseline-explorer build
      - name: Pack package
        run: |
          pnpm --filter create-project-calavera pack --pack-destination ../../package
          pnpm --filter @schalkneethling/calavera-baseline-core pack --pack-destination ../../package
          pnpm --filter @schalkneethling/calavera-artifact-core pack --pack-destination ../../package
          pnpm --filter "./packages/artifacts/*" --recursive pack --pack-destination ../../../package
      - name: Upload package artifact
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a
        with:
          name: package
          path: package/*.tgz
          if-no-files-found: error

  publish:
    name: Publish
    runs-on: ubuntu-latest
    needs: build
    environment: publish
    permissions:
      contents: read
      id-token: write
    steps:
      - name: Setup Node.js
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e
        with:
          node-version: 24
          registry-url: https://registry.npmjs.org
          package-manager-cache: false
      - name: Download package artifact
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c
        with:
          name: package
          path: package
      - name: Publish package
        run: |
          mapfile -t tarballs < <(find package -maxdepth 1 -name "*.tgz" -print)
          if [ "${#tarballs[@]}" -eq 0 ]; then
            echo "No package tarball found in package/."
            exit 1
          fi
          for tarball in "${tarballs[@]}"; do
            package_name=$(tar -xOf "$tarball" package/package.json | node -e 'let body=""; process.stdin.on("data", chunk => body += chunk); process.stdin.on("end", () => process.stdout.write(JSON.parse(body).name))')
            package_version=$(tar -xOf "$tarball" package/package.json | node -e 'let body=""; process.stdin.on("data", chunk => body += chunk); process.stdin.on("end", () => process.stdout.write(JSON.parse(body).version))')
            view_output=$(mktemp)
            if npm view "${package_name}@${package_version}" version >"$view_output" 2>&1; then
              rm "$view_output"
              echo "Skipping already published ${package_name}@${package_version}."
              continue
            else
              view_status=$?
              if ! grep -Eq '(^|[[:space:]])(E404|404)([[:space:]]|$)' "$view_output"; then
                cat "$view_output" >&2
                rm "$view_output"
                exit "$view_status"
              fi
              rm "$view_output"
              echo "Confirmed ${package_name}@${package_version} is not published."
            fi
            dist_tag=latest
            if [[ "$package_version" == *-* ]]; then
              dist_tag=next
            fi
            npm publish "$(realpath "$tarball")" --provenance --access public --tag "$dist_tag"
          done
