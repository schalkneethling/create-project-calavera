name: Publish to npm

on:
  release:
    types: [published]

permissions:
  contents: read

jobs:
  test:
    name: Test
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0
        with:
          persist-credentials: false
      - name: Setup pnpm
        uses: pnpm/action-setup@0ebf47130e4866e96fce0953f49152a61190b271
      - name: Setup Node.js
        uses: actions/setup-node@820762786026740c76f36085b0efc47a31fe5020
        with:
          node-version: 24
          package-manager-cache: false
      - name: Install dependencies
        run: pnpm install --frozen-lockfile --ignore-scripts
      - name: Check
        run: pnpm check
      - name: Validate package
        run: pnpm publish:check
      - name: Install zizmor
        run: python -m pip install --user zizmor==1.25.2
      - name: Check workflows
        run: zizmor --offline .github/workflows

  build:
    name: Build
    runs-on: ubuntu-latest
    needs: test
    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0
        with:
          persist-credentials: false
      - name: Setup pnpm
        uses: pnpm/action-setup@0ebf47130e4866e96fce0953f49152a61190b271
      - name: Setup Node.js
        uses: actions/setup-node@820762786026740c76f36085b0efc47a31fe5020
        with:
          node-version: 24
          package-manager-cache: false
      - name: Install dependencies
        run: pnpm install --frozen-lockfile --ignore-scripts
      - name: Build web composer
        run: pnpm web:build
      - name: Pack package
        run: pnpm pack --pack-destination package
      - name: Upload package artifact
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a
        with:
          name: package
          path: package/*.tgz
          if-no-files-found: error

  publish:
    name: Publish
    runs-on: ubuntu-latest
    needs: build
    environment: publish
    permissions:
      contents: read
      id-token: write
    steps:
      - name: Setup Node.js
        uses: actions/setup-node@820762786026740c76f36085b0efc47a31fe5020
        with:
          node-version: 24
          registry-url: https://registry.npmjs.org
          package-manager-cache: false
      - name: Download package artifact
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c
        with:
          name: package
          path: package
      - name: Publish package
        run: |
          mapfile -t tarballs < <(find package -maxdepth 1 -name "*.tgz" -print)
          if [ "${#tarballs[@]}" -eq 0 ]; then
            echo "No package tarball found in package/."
            exit 1
          fi
          if [ "${#tarballs[@]}" -gt 1 ]; then
            echo "Expected exactly one package tarball in package/, found ${#tarballs[@]}."
            printf '%s\n' "${tarballs[@]}"
            exit 1
          fi
          tarball="${tarballs[0]}"
          npm publish "$(realpath "$tarball")" --provenance --access public
