<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Calavera Composer</title>
    <link rel="icon" type="image/png" href="/favicon-96x96.png" sizes="96x96" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <link rel="shortcut icon" href="/favicon.ico" />
    <link rel="apple-touch-icon" sizes="180x180" href="/apple-touch-icon.png" />
    <meta name="apple-mobile-web-app-title" content="Calavera" />
    <link rel="manifest" href="/site.webmanifest" />
    <link rel="stylesheet" href="./styles.css" />
  </head>
  <body>
    <main class="shell">
      <section class="intro">
        <p class="eyebrow">Calavera</p>
        <h1>Compose a tooling recipe for any project.</h1>
        <p>
          Choose a modern or classic workflow, add integration packs, then save a
          <code>calavera.config.json</code> for the CLI to apply.
        </p>
      </section>

      <section class="workspace" aria-label="Recipe composer">
        <form class="panel" id="composer">
          <fieldset>
            <legend>Profile</legend>
            <label>
              <input type="radio" name="profile" value="modern" checked />
              Modern: Oxlint, Oxfmt, Stylelint
            </label>
            <label>
              <input type="radio" name="profile" value="classic" />
              Classic: ESLint, Prettier, Stylelint
            </label>
            <label>
              <input type="radio" name="profile" value="minimal" />
              Minimal: EditorConfig only
            </label>
          </fieldset>

          <label class="field">
            Package manager
            <select name="packageManager">
              <option value="npm">npm</option>
              <option value="pnpm">pnpm</option>
              <option value="yarn">yarn</option>
              <option value="bun">bun</option>
            </select>
          </label>

          <fieldset>
            <legend>Integration packs</legend>
            <div id="integrations" class="integrations"></div>
          </fieldset>
        </form>

        <aside class="panel preview">
          <div class="actions">
            <button id="save" type="button">Save file</button>
            <button id="download" type="button">Download JSON</button>
          </div>
          <pre><code id="output"></code></pre>
        </aside>
      </section>
    </main>

    <script type="module" src="./script.js"></script>
  </body>
</html>
